<section class="simulador-container">
    <form (ngSubmit)="onSubmit()">
        <h2>Insira os dados para a simulação</h2>
    <div class="form-group">
      <label for="valor">Valor do Empréstimo (R$):</label>
      <input
        type="number"
        id="valorDesejado"
        name="valorDesejado"
        [(ngModel)]="dadosSimulacao.valorDesejado"
        placeholder="Ex: 5000"
        required
      />
    </div>

    <div class="form-group">
      <label for="prazo">Prazo (em meses):</label>
      <input
        type="number"
        id="prazo"
        name="prazo"
        [(ngModel)]="dadosSimulacao.prazo"
        placeholder="Ex: 24"
        required
      />
    </div>

    <button type="submit">Simular</button>
    </form>

    <div class="resultado-container">
    @if (resultadoSimulacao) {
      <div class="resultado">
        <h3>Simulação Aprovada!</h3>
        <p><strong>Produto Oferecido:</strong></p>
        <div>
          {{ resultadoSimulacao.nomeProduto }}
        </div>
        
        <h4>Detalhes - Amortização SAC</h4>

        <h4>Detalhes - Amortização Price</h4>

        <pre>{{ resultadoSimulacao | json }}</pre>
      </div>
    } @else if (erroNaSimulacao) {
      <div class="erro">
        <p>{{ erroNaSimulacao }}</p>
      </div>
    }
  </div>

</section>
